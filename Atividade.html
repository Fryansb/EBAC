<body><!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">

        <style>
            *{
                padding: 0px;
                margin: 0px;
            }
            html, body{
                height: 100%;
            }
            body{
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-width: 100vh;
                background-color: #f0f0f0;
            }
            form {
                display: flex;
                flex-direction: column;
                background-color: white;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            }
            form button{
                width: 100%;
                margin-top: 10px;
                padding: 10px;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
    
            form button:hover {
                background-color: #45a049;
            }
    
            form label {
                margin-top: 10px;
            }
    
            form input {
                padding: 8px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 5px;
            }
    
            form input:focus {
                border-color: #4CAF50;
                outline: none;
            }
    
            caption {
                margin-bottom: 10px;
                font-size: 18px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>

        <h1>Fomulário de Cadastro</h1>
    
        <form action="" method="post">

            <label for="name">Nome</label>
            <input id="name" type="text" name="name" required>
           
            <label for="email">E-mail</label>
